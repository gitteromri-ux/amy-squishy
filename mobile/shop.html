    /* ---- Shop hero strip (small) ---- */
    .shop-hero {
      background: linear-gradient(135deg, var(--pink-tint) 0%, var(--sky) 100%);
      padding: 64px 0 54px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .shop-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url('assets/img/hero-bg.png') center/cover no-repeat;
      opacity: .07;
    }
    .shop-hero-inner { position: relative; z-index: 1; }
    .shop-hero h1 {
      font-family: var(--font-display);
      font-size: var(--t-2xl);
      font-weight: 900;
      color: var(--ink);
      margin-bottom: 10px;
    }
    .shop-hero h1 .accent { color: var(--pink-deep); }
    .shop-hero p {
      color: var(--ink-soft);
      font-size: var(--t-lg);
      max-width: 520px;
      margin: 0 auto;
    }

    /* ---- Controls bar ---- */
    .shop-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 220px;
      max-width: 360px;
    }
    .search-wrap .icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      pointer-events: none;
      color: var(--pink-deep);
    }
    #shopSearch {
      width: 100%;
      padding: 12px 44px 12px 18px;
      border-radius: var(--r-pill);
      border: 1.5px solid var(--line);
      background: var(--white);
      font-family: var(--font-body);
      font-size: var(--t-base);
      color: var(--ink);
      outline: none;
      transition: border-color .25s, box-shadow .25s;
    }
    #shopSearch:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(247,181,196,.25);
    }
    .sort-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sort-wrap label {
      font-size: var(--t-sm);
      font-weight: 700;
      color: var(--ink-soft);
      white-space: nowrap;
    }
    #shopSort {
      padding: 10px 16px;
      border-radius: var(--r-pill);
      border: 1.5px solid var(--line);
      background: var(--white);
      font-family: var(--font-body);
      font-size: var(--t-sm);
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      outline: none;
      transition: border-color .25s;
    }
    #shopSort:focus { border-color: var(--pink); }

    /* ---- Result count ---- */
    .result-count {
      font-size: var(--t-sm);
      color: var(--ink-soft);
      font-weight: 600;
      margin-bottom: 28px;
    }
    .result-count b { color: var(--pink-deep); }

    /* ---- Empty state ---- */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--ink-soft);
    }
    .empty-state .e { font-size: 4rem; margin-bottom: 16px; }
    .empty-state h3 { font-size: var(--t-xl); margin-bottom: 10px; color: var(--ink); }

    /* ---- Tabs sticky on scroll ---- */
    .tabs-wrap {
      position: sticky;
      top: var(--nav-h);
      z-index: 60;
      background: var(--white);
      box-shadow: 0 6px 18px -12px rgba(0,0,0,.18);
      padding: 18px 0 16px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 0;
    }
    .tabs-wrap .tabs { margin-bottom: 0; }

    /* ---- Filters sidebar polish ---- */
    .filters-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .filters-close {
      display: none;
      background: var(--pink-tint);
      color: var(--pink-deep);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 1.2rem;
      line-height: 1;
      font-weight: 700;
      align-items: center;
      justify-content: center;
    }
    .filters-sub {
      font-size: var(--t-xs);
      color: var(--ink-soft);
      margin-bottom: 8px;
    }
    .filter-group .scroll-list {
      max-height: none;
      overflow: visible;
      margin: -2px;
      padding: 2px;
    }
    .filters-toggle {
      background: var(--ink);
      color: #fff;
      padding: 11px 18px;
      border-radius: var(--r-pill);
      font-weight: 700;
      font-size: var(--t-sm);
    }
    .filters-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 199;
    }
    .filters-backdrop.open { display: block; }

    /* ---- Responsive ---- */
    @media(max-width:900px){
      .filters-close { display: inline-flex; }
    }
    @media(max-width:768px){
      .shop-controls { flex-direction: column; align-items: stretch; }
      .search-wrap { max-width: 100%; }
    }

<script>
  AmyApp.mountChrome("shop");

  // ---- Price ranges (computed from data) ----
  const PRICE_RANGES = [
    { id: "p1", label: "עד ₪20",   test: p => p.price <= 20 },
    { id: "p2", label: "₪20–₪40",  test: p => p.price > 20 && p.price <= 40 },
    { id: "p3", label: "₪40–₪60",  test: p => p.price > 40 && p.price <= 60 },
    { id: "p4", label: "₪60 ומעלה", test: p => p.price > 60 },
  ];

  // ---- Filter state ----
  // currentCat kept for hash/tabs compatibility ("all" or a single cat id).
  // selectedCats is the authoritative multi-select Set used by the sidebar.
  let currentCat = "all";
  let currentSearch = "";
  let currentSort = "default";
  const selectedCats = new Set();      // empty = all categories
  const selectedShip = new Set();      // "fast" and/or "std"
  const selectedPrice = new Set();     // price range ids

  // ---- Build category tabs (top quick-nav) ----
  function buildTabs() {
    const tabs = document.getElementById("catTabs");

    const counts = {};
    AMY.PRODUCTS.forEach(p => { counts[p.cat] = (counts[p.cat] || 0) + 1; });

    let html = `<button class="tab active" data-cat="all">
      <span class="e">✨</span> הכל <span style="opacity:.6;font-size:.8em">(${AMY.PRODUCTS.length})</span>
    </button>`;

    AMY.CATEGORIES.forEach(c => {
      const n = counts[c.id] || 0;
      html += `<button class="tab" data-cat="${c.id}">
        <span class="e">${c.emoji}</span> ${c.name.split(" ")[0]} <span style="opacity:.6;font-size:.8em">(${n})</span>
      </button>`;
    });

    tabs.innerHTML = html;

    tabs.addEventListener("click", e => {
      const btn = e.target.closest("[data-cat]");
      if (!btn) return;
      const cat = btn.getAttribute("data-cat");
      // Tab selects a single category (or all). Sync the sidebar checkboxes.
      selectedCats.clear();
      if (cat !== "all") selectedCats.add(cat);
      currentCat = cat;
      syncCatCheckboxes();
      setActiveTab();
      location.hash = cat === "all" ? "" : cat;
      renderGrid();
    });
  }

  // ---- Build sidebar filters ----
  function buildSidebar() {
    const counts = {};
    AMY.PRODUCTS.forEach(p => { counts[p.cat] = (counts[p.cat] || 0) + 1; });

    // Category checkboxes
    const catBox = document.getElementById("catFilters");
    catBox.innerHTML = AMY.CATEGORIES.map(c => {
      const n = counts[c.id] || 0;
      return `<label class="filter-opt">
        <input type="checkbox" class="f-cat" value="${c.id}">
        <span>${c.emoji} ${c.name}</span>
        <span class="cnt">${n}</span>
      </label>`;
    }).join("");

    // Shipping speed
    const fastCount = AMY.PRODUCTS.filter(p => p.fast === true).length;
    const stdCount = AMY.PRODUCTS.filter(p => p.fast !== true).length;
    document.getElementById("shipFilters").innerHTML = `
      <label class="filter-opt">
        <input type="checkbox" class="f-ship" value="fast">
        <span>⚡ משלוח אקספרס (4 ימים)</span>
        <span class="cnt">${fastCount}</span>
      </label>
      <label class="filter-opt">
        <input type="checkbox" class="f-ship" value="std">
        <span>🚚 משלוח רגיל</span>
        <span class="cnt">${stdCount}</span>
      </label>`;

    // Price ranges
    document.getElementById("priceFilters").innerHTML = PRICE_RANGES.map(r => {
      const n = AMY.PRODUCTS.filter(r.test).length;
      return `<label class="filter-opt">
        <input type="checkbox" class="f-price" value="${r.id}">
        <span>${r.label}</span>
        <span class="cnt">${n}</span>
      </label>`;
    }).join("");

    // Wire change handlers
    catBox.querySelectorAll(".f-cat").forEach(cb => {
      cb.addEventListener("change", () => {
        if (cb.checked) selectedCats.add(cb.value); else selectedCats.delete(cb.value);
        // Keep tab/hash state coherent with the multi-select.
        currentCat = selectedCats.size === 1 ? [...selectedCats][0] : "all";
        setActiveTab();
        location.hash = selectedCats.size === 1 ? currentCat : "";
        renderGrid();
      });
    });
    document.querySelectorAll(".f-ship").forEach(cb => {
      cb.addEventListener("change", () => {
        if (cb.checked) selectedShip.add(cb.value); else selectedShip.delete(cb.value);
        renderGrid();
      });
    });
    document.querySelectorAll(".f-price").forEach(cb => {
      cb.addEventListener("change", () => {
        if (cb.checked) selectedPrice.add(cb.value); else selectedPrice.delete(cb.value);
        renderGrid();
      });
    });
  }

  // ---- Sync sidebar category checkboxes from selectedCats ----
  function syncCatCheckboxes() {
    document.querySelectorAll(".f-cat").forEach(cb => {
      cb.checked = selectedCats.has(cb.value);
    });
  }

  // ---- Highlight active tab from currentCat ----
  function setActiveTab() {
    document.querySelectorAll(".tab").forEach(t => {
      t.classList.toggle("active", t.getAttribute("data-cat") === currentCat);
    });
  }

  // ---- Render grid (AND logic across all filter groups) ----
  function renderGrid() {
    let products = [...AMY.PRODUCTS];

    // Category (multi-select; empty = all)
    if (selectedCats.size > 0) {
      products = products.filter(p => selectedCats.has(p.cat));
    }

    // Shipping speed
    if (selectedShip.size > 0) {
      products = products.filter(p => {
        const isFast = p.fast === true;
        return (selectedShip.has("fast") && isFast) || (selectedShip.has("std") && !isFast);
      });
    }

    // Price ranges
    if (selectedPrice.size > 0) {
      products = products.filter(p =>
        PRICE_RANGES.some(r => selectedPrice.has(r.id) && r.test(p))
      );
    }

    // Search
    if (currentSearch.trim()) {
      const q = currentSearch.trim().toLowerCase();
      products = products.filter(p => p.name.includes(q) || p.name.toLowerCase().includes(q));
    }

    // Sort
    if (currentSort === "price-asc") {
      products.sort((a, b) => a.price - b.price);
    } else if (currentSort === "price-desc") {
      products.sort((a, b) => b.price - a.price);
    } else if (currentSort === "name") {
      products.sort((a, b) => a.name.localeCompare(b.name, "he"));
    }

    const grid = document.getElementById("prodGrid");
    const countEl = document.getElementById("resultCount");

    if (products.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="e">🔍</div>
        <h3>לא נמצאו דגמים</h3>
        <p>נסי לשנות את הסינון או החיפוש</p>
        <button class="btn btn-pink" style="margin-top:20px" onclick="resetFilters()">איפוס סינון</button>
      </div>`;
      countEl.innerHTML = `מציג <b>0</b> דגמים`;
    } else {
      grid.innerHTML = products.map(p => AmyApp.prodCard(p)).join("");
      countEl.innerHTML = `מציג <b>${products.length}</b> דגמים`;
    }

    AmyApp.initReveal();
  }

  function resetFilters() {
    currentCat = "all";
    currentSearch = "";
    currentSort = "default";
    selectedCats.clear();
    selectedShip.clear();
    selectedPrice.clear();
    document.getElementById("shopSearch").value = "";
    document.getElementById("shopSort").value = "default";
    document.querySelectorAll(".f-cat, .f-ship, .f-price").forEach(cb => { cb.checked = false; });
    setActiveTab();
    location.hash = "";
    renderGrid();
  }

  // ---- Search ----
  document.getElementById("shopSearch").addEventListener("input", e => {
    currentSearch = e.target.value;
    renderGrid();
  });

  // ---- Sort ----
  document.getElementById("shopSort").addEventListener("change", e => {
    currentSort = e.target.value;
    renderGrid();
  });

  // ---- Mobile filter drawer ----
  const filtersPanel = document.getElementById("filtersPanel");
  const filtersBackdrop = document.getElementById("filtersBackdrop");
  function openFilters() {
    filtersPanel.classList.add("open");
    filtersBackdrop.classList.add("open");
  }
  function closeFilters() {
    filtersPanel.classList.remove("open");
    filtersBackdrop.classList.remove("open");
  }
  document.getElementById("filtersToggle").addEventListener("click", openFilters);
  document.getElementById("filtersClose").addEventListener("click", closeFilters);
  filtersBackdrop.addEventListener("click", closeFilters);

  // ---- Deep link via hash (single category) ----
  function applyHash() {
    const hash = location.hash.replace("#", "").trim();
    if (hash && AMY.CATEGORIES.find(c => c.id === hash)) {
      selectedCats.clear();
      selectedCats.add(hash);
      currentCat = hash;
      syncCatCheckboxes();
      setActiveTab();
      setTimeout(() => {
        const sec = document.getElementById("catalogSection");
        if (sec) sec.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 120);
    }
  }

  // ---- ?search= URL param (from nav search box) ----
  function applySearchParam() {
    const params = new URLSearchParams(location.search);
    const q = params.get("search");
    if (q) {
      currentSearch = q;
      const input = document.getElementById("shopSearch");
      if (input) input.value = q;
    }
  }

  // ---- Init ----
  buildTabs();
  buildSidebar();
  applyHash();
  syncCatCheckboxes();
  applySearchParam();
  renderGrid();
  AmyApp.initReveal();

  // Hash changes (browser back/forward)
  window.addEventListener("hashchange", () => {
    applyHash();
    renderGrid();
  });
</script>
