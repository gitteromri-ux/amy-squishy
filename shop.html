<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>החנות של איימי · איימי סקווישי</title>
  <meta name="description" content="כל הסקווישי במקום אחד — 85 דגמים ב-15 קטגוריות. נידו, מוציא עיניים, חול, מים, ועוד. משלוח לכל הארץ.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&family=Heebo:wght@400;500;700;800;900&family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ---- Shop hero strip (small) ---- */
    .shop-hero {
      background: linear-gradient(135deg, var(--pink-tint) 0%, var(--sky) 100%);
      padding: 64px 0 54px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .shop-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url('assets/img/hero-bg.png') center/cover no-repeat;
      opacity: .07;
    }
    .shop-hero-inner { position: relative; z-index: 1; }
    .shop-hero h1 {
      font-family: var(--font-display);
      font-size: var(--t-2xl);
      font-weight: 900;
      color: var(--ink);
      margin-bottom: 10px;
    }
    .shop-hero h1 .accent { color: var(--pink-deep); }
    .shop-hero p {
      color: var(--ink-soft);
      font-size: var(--t-lg);
      max-width: 520px;
      margin: 0 auto;
    }

    /* ---- Controls bar ---- */
    .shop-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 220px;
      max-width: 360px;
    }
    .search-wrap .icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      pointer-events: none;
      color: var(--pink-deep);
    }
    #shopSearch {
      width: 100%;
      padding: 12px 44px 12px 18px;
      border-radius: var(--r-pill);
      border: 1.5px solid var(--line);
      background: var(--white);
      font-family: var(--font-body);
      font-size: var(--t-base);
      color: var(--ink);
      outline: none;
      transition: border-color .25s, box-shadow .25s;
    }
    #shopSearch:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(247,181,196,.25);
    }
    .sort-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sort-wrap label {
      font-size: var(--t-sm);
      font-weight: 700;
      color: var(--ink-soft);
      white-space: nowrap;
    }
    #shopSort {
      padding: 10px 16px;
      border-radius: var(--r-pill);
      border: 1.5px solid var(--line);
      background: var(--white);
      font-family: var(--font-body);
      font-size: var(--t-sm);
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      outline: none;
      transition: border-color .25s;
    }
    #shopSort:focus { border-color: var(--pink); }

    /* ---- Result count ---- */
    .result-count {
      font-size: var(--t-sm);
      color: var(--ink-soft);
      font-weight: 600;
      margin-bottom: 28px;
    }
    .result-count b { color: var(--pink-deep); }

    /* ---- Empty state ---- */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--ink-soft);
    }
    .empty-state .e { font-size: 4rem; margin-bottom: 16px; }
    .empty-state h3 { font-size: var(--t-xl); margin-bottom: 10px; color: var(--ink); }

    /* ---- Tabs sticky on scroll ---- */
    .tabs-wrap {
      position: sticky;
      top: var(--nav-h);
      z-index: 50;
      background: rgba(255,252,253,.9);
      backdrop-filter: blur(12px);
      padding: 18px 0 16px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 0;
    }
    .tabs-wrap .tabs { margin-bottom: 0; }

    /* ---- Responsive ---- */
    @media(max-width:768px){
      .shop-controls { flex-direction: column; align-items: stretch; }
      .search-wrap { max-width: 100%; }
    }
  </style>
</head>
<body>

<div id="nav-mount"></div>

<!-- Hero strip -->
<section class="shop-hero">
  <div class="container shop-hero-inner">
    <h1>החנות של <span class="accent">איימי</span> 🛍️</h1>
    <p>85 דגמי סקווישי ב-15 קטגוריות — מהנידו הקלאסי ועד הענקים הפרימיום. כולם מחכים לך!</p>
  </div>
</section>

<!-- Tabs -->
<div class="tabs-wrap" id="tabsWrap">
  <div class="container">
    <div class="tabs" id="catTabs"></div>
  </div>
</div>

<!-- Main catalog -->
<section class="sec" style="padding-top:48px" id="catalogSection">
  <div class="container">

    <!-- Controls -->
    <div class="shop-controls">
      <div class="search-wrap">
        <span class="icon">🔍</span>
        <input type="search" id="shopSearch" placeholder="חיפוש סקווישי..." autocomplete="off" aria-label="חיפוש מוצרים">
      </div>
      <div class="sort-wrap">
        <label for="shopSort">מיון:</label>
        <select id="shopSort" aria-label="מיין לפי">
          <option value="default">מומלצים</option>
          <option value="price-asc">מחיר: מהזול ליקר</option>
          <option value="price-desc">מחיר: מהיקר לזול</option>
        </select>
      </div>
    </div>

    <!-- Result count -->
    <p class="result-count" id="resultCount"></p>

    <!-- Product grid -->
    <div class="prod-grid" id="prodGrid"></div>

  </div>
</section>

<div id="footer-mount"></div>
<div id="wa-mount"></div>

<script src="js/products.js"></script>
<script src="js/app.js"></script>
<script src="js/whatsapp.js"></script>
<script>
  AmyApp.mountChrome("shop");

  // ---- State ----
  let currentCat = "all";
  let currentSearch = "";
  let currentSort = "default";

  // ---- Build tabs ----
  function buildTabs() {
    const tabs = document.getElementById("catTabs");

    // Count per category
    const counts = {};
    AMY.PRODUCTS.forEach(p => { counts[p.cat] = (counts[p.cat] || 0) + 1; });

    let html = `<button class="tab active" data-cat="all">
      <span class="e">✨</span> הכל <span style="opacity:.6;font-size:.8em">(${AMY.PRODUCTS.length})</span>
    </button>`;

    AMY.CATEGORIES.forEach(c => {
      const n = counts[c.id] || 0;
      html += `<button class="tab" data-cat="${c.id}">
        <span class="e">${c.emoji}</span> ${c.name.split(" ")[0]} <span style="opacity:.6;font-size:.8em">(${n})</span>
      </button>`;
    });

    tabs.innerHTML = html;

    tabs.addEventListener("click", e => {
      const btn = e.target.closest("[data-cat]");
      if (!btn) return;
      tabs.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      btn.classList.add("active");
      currentCat = btn.getAttribute("data-cat");
      location.hash = currentCat === "all" ? "" : currentCat;
      renderGrid();
    });
  }

  // ---- Render grid ----
  function renderGrid() {
    let products = [...AMY.PRODUCTS];

    // Filter by category
    if (currentCat !== "all") {
      products = products.filter(p => p.cat === currentCat);
    }

    // Filter by search
    if (currentSearch.trim()) {
      const q = currentSearch.trim().toLowerCase();
      products = products.filter(p => p.name.includes(q) || p.name.toLowerCase().includes(q));
    }

    // Sort
    if (currentSort === "price-asc") {
      products.sort((a, b) => a.price - b.price);
    } else if (currentSort === "price-desc") {
      products.sort((a, b) => b.price - a.price);
    }

    const grid = document.getElementById("prodGrid");
    const countEl = document.getElementById("resultCount");

    if (products.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="e">🔍</div>
        <h3>לא נמצאו דגמים</h3>
        <p>נסי לשנות את הסינון או החיפוש</p>
        <button class="btn btn-pink" style="margin-top:20px" onclick="resetFilters()">איפוס סינון</button>
      </div>`;
      countEl.innerHTML = `מציג <b>0</b> דגמים`;
    } else {
      grid.innerHTML = products.map(p => AmyApp.prodCard(p)).join("");
      countEl.innerHTML = `מציג <b>${products.length}</b> דגמים`;
    }

    AmyApp.initReveal();
  }

  function resetFilters() {
    currentCat = "all";
    currentSearch = "";
    currentSort = "default";
    document.getElementById("shopSearch").value = "";
    document.getElementById("shopSort").value = "default";
    document.querySelectorAll(".tab").forEach((t, i) => t.classList.toggle("active", i === 0));
    location.hash = "";
    renderGrid();
  }

  // ---- Search ----
  document.getElementById("shopSearch").addEventListener("input", e => {
    currentSearch = e.target.value;
    renderGrid();
  });

  // ---- Sort ----
  document.getElementById("shopSort").addEventListener("change", e => {
    currentSort = e.target.value;
    renderGrid();
  });

  // ---- Deep link via hash ----
  function applyHash() {
    const hash = location.hash.replace("#", "").trim();
    if (hash && AMY.CATEGORIES.find(c => c.id === hash)) {
      currentCat = hash;
      // Activate correct tab
      document.querySelectorAll(".tab").forEach(t => {
        t.classList.toggle("active", t.getAttribute("data-cat") === hash);
      });
      // Scroll to catalog
      setTimeout(() => {
        const sec = document.getElementById("catalogSection");
        if (sec) sec.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 120);
    }
  }

  // ---- Init ----
  buildTabs();
  applyHash();
  renderGrid();
  AmyApp.initReveal();

  // Hash changes (browser back/forward)
  window.addEventListener("hashchange", () => {
    applyHash();
    renderGrid();
  });
</script>

</body>
</html>
